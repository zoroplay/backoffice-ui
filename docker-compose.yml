services:
  app:
    image: ghcr.io/zoroplay/bo-ui:latest
    ports:
      - "8090:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - HOSTNAME=0.0.0.0
    networks:
      - sbenet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003"]
      timeout: 10s
      interval: 30s
      retries: 3
      start_period: 40s

networks:
  sbenet:
    external: true